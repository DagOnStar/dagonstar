name: Tests

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -e ".[docker]"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile source files
        run: python -m py_compile dagon/*.py dagon/api/*.py dagon/communication/*.py dagon/ftp_publisher/*.py dagon/peer2peer/*.py

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality tools
        run: python -m pip install mypy==1.13.0 ruff==0.6.9

      - name: Run focused style checks
        run: python -m ruff check dagon/shell.py tests

      - name: Run progressive type checks
        run: python -m mypy dagon/shell.py
